services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: realestate_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d realestate_radar"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
